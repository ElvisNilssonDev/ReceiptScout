name: CI

on:
  push:
  pull_request:

jobs:
  build-and-test:
    name: Build & test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Restore
        run: |
          dotnet restore api/src/ReceiptScout.Api/ReceiptScout.Api.csproj
          dotnet restore api/tests/ReceiptScout.Application.Tests/ReceiptScout.Application.Tests.csproj

      - name: Build
        run: dotnet build api/src/ReceiptScout.Api/ReceiptScout.Api.csproj --configuration Release --no-restore

      - name: Test
        run: dotnet test api/tests/ReceiptScout.Application.Tests/ReceiptScout.Application.Tests.csproj --configuration Release --no-restore
